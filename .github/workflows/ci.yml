name: ci

# Scope:
#   - Every PR runs lint + typecheck + tests.
#   - PRs + non-main branches deploy to the `dev` environment (no review).
#   - Pushes to `main` deploy to `production` (required reviewer).
#
# The difference is entirely which GitHub environment the deploy jobs
# target; the same Railway services handle both, routed by
# `RAILWAY_ENVIRONMENT` (production|dev).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  actions: read
  deployments: write

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.17.3"
  OTP_VERSION: "27.1.2"
  # Build-time config for web + app. Swap to your own hostnames.
  VITE_HELA_API:     https://gateway-production-bfdf.up.railway.app
  VITE_HELA_GATEWAY: https://gateway-production-bfdf.up.railway.app
  VITE_HELA_CONTROL: https://control-production-059e.up.railway.app

jobs:
  # ---------- lint / format check (fast-fail) ---------------------------

  lint-elixir:
    name: elixir · format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with: { elixir-version: "${{ env.ELIXIR_VERSION }}", otp-version: "${{ env.OTP_VERSION }}" }
      # .formatter.exs pulls `import_deps: [:ecto, ...]`, so we need the
      # actual dep trees on disk before `mix format --check-formatted`
      # knows what to do. Cache them both so this stays fast.
      - uses: actions/cache@v5
        with:
          path: |
            apps/gateway/deps
            apps/gateway/_build
            apps/control/deps
            apps/control/_build
          key: elixir-deps-${{ hashFiles('apps/**/mix.lock') }}
      - run: mix deps.get
        working-directory: apps/gateway
      - run: mix deps.get
        working-directory: apps/control
      - name: gateway · mix format --check-formatted
        run: mix format --check-formatted
        working-directory: apps/gateway
      - name: control · mix format --check-formatted
        run: mix format --check-formatted
        working-directory: apps/control

  lint-js:
    name: js · prettier + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile
      - name: prettier
        run: bunx --bun prettier --check "apps/{web,app}/src/**/*.{ts,tsx,css}" "packages/**/src/**/*.{ts,tsx}" "scripts/**/*.ts"
      # sdk-types has to emit its .d.ts files before sdk-js can
      # typecheck (sdk-js depends on @hela/sdk-types). We build
      # sdk-types, then typecheck sdk-js against the built output.
      - name: build sdk-types
        run: cd packages/sdk-types && bun run build
      - name: typecheck sdk-js
        run: cd packages/sdk-js && bunx --bun tsc -p tsconfig.json --noEmit

  # ---------- tests -----------------------------------------------------

  test-gateway:
    name: gateway · test
    runs-on: ubuntu-latest
    needs: [lint-elixir]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gateway_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with: { elixir-version: "${{ env.ELIXIR_VERSION }}", otp-version: "${{ env.OTP_VERSION }}" }
      - uses: actions/cache@v5
        with:
          path: |
            apps/gateway/deps
            apps/gateway/_build
          key: gateway-${{ hashFiles('apps/gateway/mix.lock') }}
      - run: mix deps.get
        working-directory: apps/gateway
      - run: mix compile --warnings-as-errors
        working-directory: apps/gateway
      - run: mix test --warnings-as-errors
        working-directory: apps/gateway

  test-control:
    name: control · test
    runs-on: ubuntu-latest
    needs: [lint-elixir]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: control_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with: { elixir-version: "${{ env.ELIXIR_VERSION }}", otp-version: "${{ env.OTP_VERSION }}" }
      - uses: actions/cache@v5
        with:
          path: |
            apps/control/deps
            apps/control/_build
          key: control-${{ hashFiles('apps/control/mix.lock') }}
      - run: mix deps.get
        working-directory: apps/control
      - run: mix compile --warnings-as-errors
        working-directory: apps/control
      - run: mix test --warnings-as-errors
        working-directory: apps/control

  build-js:
    name: js · build web + app
    runs-on: ubuntu-latest
    needs: [lint-js]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile
      - run: bun run build:sdk
      - run: cd apps/web && bun run build
      - run: cd apps/app && bun run build

  lint-terraform:
    name: terraform · fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive infra/

  # ---------- sdk-py ---------------------------------------------------
  #
  # Two jobs that run in parallel:
  #   - schema-drift: regenerate type modules and fail if the diff is
  #     non-empty. Catches PRs that edit a JSON Schema without running
  #     `make sdk.gen`.
  #   - test-sdk-py: ruff + pytest. The live-integration suite is gated
  #     behind HELA_LIVE=1 so it stays off here.

  schema-drift:
    name: schema · regenerate + diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with: { python-version: "3.13" }
      - name: regenerate SDK types
        run: uv run packages/sdk-gen/gen.py
      - name: assert no drift
        run: |
          if ! git diff --exit-code --stat; then
            echo ""
            echo "::error::Generated SDK types are out of date. Run \`make sdk.gen\` and commit the result."
            exit 1
          fi

  test-sdk-py:
    name: sdk-py · ruff + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-py
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with: { python-version: "3.13" }
      - name: install deps
        run: uv sync --all-extras
      - name: ruff check
        run: uv run ruff check src/ tests/
      - name: ruff format
        run: uv run ruff format --check src/ tests/
      - name: pytest
        run: uv run pytest tests/ -v

  test-sdk-go:
    name: sdk-go · vet + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with: { go-version: "1.23" }
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt violations:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race ./...

  # ---------- deploy selector ------------------------------------------
  #
  # One set of deploy jobs, parameterised by the GitHub environment:
  #   - PRs + non-main branches → `dev`   (auto-approved, dev Railway env)
  #   - push to main             → `production` (reviewer-approved, prod Railway env)
  #
  # The `RAILWAY_ENVIRONMENT` env var at runtime picks which Railway
  # environment `railway up` targets — so the same deploy steps run for
  # both, the only difference is the token and the target env name.

  # Determine which GitHub environment to deploy to. No ternary in
  # workflow expressions, so we emit it as a job output.
  target:
    name: pick deploy target
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.pick.outputs.env }}
      railway_env: ${{ steps.pick.outputs.railway_env }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "env=production"        >> "$GITHUB_OUTPUT"
            echo "railway_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev"               >> "$GITHUB_OUTPUT"
            echo "railway_env=dev"       >> "$GITHUB_OUTPUT"
          fi

  deploy-control:
    name: deploy · control (${{ needs.target.outputs.env }})
    needs: [test-control, target]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.target.outputs.env }}
    concurrency: deploy-control-${{ needs.target.outputs.env }}
    steps:
      - uses: actions/checkout@v6
      - run: curl -fsSL https://railway.com/install.sh | sh && echo "$HOME/.railway/bin" >> "$GITHUB_PATH"
      - run: |
          railway up ./apps/control --service control --path-as-root --ci --detach \
            --environment ${{ needs.target.outputs.railway_env }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-gateway:
    name: deploy · gateway (${{ needs.target.outputs.env }})
    needs: [test-gateway, target, deploy-control]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.target.outputs.env }}
    concurrency: deploy-gateway-${{ needs.target.outputs.env }}
    steps:
      - uses: actions/checkout@v6
      - run: curl -fsSL https://railway.com/install.sh | sh && echo "$HOME/.railway/bin" >> "$GITHUB_PATH"
      - run: |
          railway up ./apps/gateway --service gateway --path-as-root --ci --detach \
            --environment ${{ needs.target.outputs.railway_env }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-web:
    name: deploy · web (${{ needs.target.outputs.env }})
    needs: [build-js, target, deploy-gateway]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.target.outputs.env }}
    concurrency: deploy-web-${{ needs.target.outputs.env }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:sdk
      - run: cd apps/web && bun run build
      - run: curl -fsSL https://railway.com/install.sh | sh && echo "$HOME/.railway/bin" >> "$GITHUB_PATH"
      - run: |
          railway up ./apps/web --service web --path-as-root --ci --detach \
            --environment ${{ needs.target.outputs.railway_env }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-app:
    name: deploy · app (${{ needs.target.outputs.env }})
    needs: [build-js, target, deploy-control]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.target.outputs.env }}
    concurrency: deploy-app-${{ needs.target.outputs.env }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:sdk
      - run: cd apps/app && bun run build
      - run: curl -fsSL https://railway.com/install.sh | sh && echo "$HOME/.railway/bin" >> "$GITHUB_PATH"
      - run: |
          railway up ./apps/app --service app --path-as-root --ci --detach \
            --environment ${{ needs.target.outputs.railway_env }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ---------- post-deploy smoke ----------------------------------------

  smoke:
    name: smoke · e2e.py against ${{ needs.target.outputs.env }}
    needs: [deploy-gateway, deploy-control, deploy-web, deploy-app, target]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with: { python-version: "3.13" }
      - name: wait for rolling deploys to land
        run: sleep 30
      - name: e2e.py
        run: uv run scripts/e2e.py
        env:
          HELA_GATEWAY: ${{ env.VITE_HELA_GATEWAY }}
          HELA_CONTROL: ${{ env.VITE_HELA_CONTROL }}
