[project]
name = "hela"
version = "0.1.0"
description = "Python SDK for hela — managed real-time on BEAM."
readme = "README.md"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "V0ID", email = "hey@v0id.me" }]
requires-python = ">=3.11"
keywords = ["realtime", "websocket", "phoenix", "channels", "presence"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Communications :: Chat",
    "Topic :: Internet :: WWW/HTTP",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
    "websockets>=13",
]

[project.urls]
Homepage = "https://hela.dev"
Repository = "https://github.com/v0id-user/hela"
Issues = "https://github.com/v0id-user/hela/issues"

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hela"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
# _generated/ is emitted by datamodel-code-generator; formatting is its
# business, not ours. Lint + format both skip it. The schema-drift guard
# in CI still catches real semantic changes.
extend-exclude = ["src/hela/_generated"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = [
    "E501",    # pyright/ruff format handles lines
    "RUF022",  # __all__ is grouped by category (top-level / types / errors), not alphabetical
]
