# lefthook — run format + lint + tests before every commit so CI
# is mostly just a safety net, not the first line of defence.
#
# Install once:
#   lefthook install
# Uninstall:
#   lefthook uninstall
#
# Skip a hook for one commit:
#   LEFTHOOK=0 git commit ...
#
# Rules live next to the code they gate — Python in packages/sdk-py,
# Go in packages/sdk-go, Rust in packages/sdk-rs. A hook only fires
# when a staged file matches its glob, so editing Python docs does
# not run the Go test suite.

pre-commit:
  parallel: true
  commands:
    # --- Python SDK ---------------------------------------------------
    sdk-py-format:
      tags: python format
      glob: "packages/sdk-py/**/*.py"
      root: "packages/sdk-py"
      run: uv run ruff format {staged_files}
      stage_fixed: true

    sdk-py-lint:
      tags: python lint
      glob: "packages/sdk-py/**/*.py"
      root: "packages/sdk-py"
      run: uv run ruff check {staged_files}

    sdk-py-test:
      tags: python test
      glob: "packages/sdk-py/**/*.py"
      root: "packages/sdk-py"
      run: uv run pytest tests/ -q

    # --- Go SDK -------------------------------------------------------
    sdk-go-fmt:
      tags: go format
      glob: "packages/sdk-go/**/*.go"
      root: "packages/sdk-go"
      run: gofmt -l -w {staged_files}
      stage_fixed: true

    sdk-go-vet:
      tags: go lint
      glob: "packages/sdk-go/**/*.go"
      root: "packages/sdk-go"
      run: go vet ./...

    sdk-go-test:
      tags: go test
      glob: "packages/sdk-go/**/*.go"
      root: "packages/sdk-go"
      run: go test ./...

    # --- Rust SDK -----------------------------------------------------
    sdk-rs-fmt:
      tags: rust format
      glob: "packages/sdk-rs/**/*.rs"
      root: "packages/sdk-rs"
      run: cargo fmt --
      stage_fixed: true

    sdk-rs-clippy:
      tags: rust lint
      glob: "packages/sdk-rs/**/*.rs"
      root: "packages/sdk-rs"
      run: cargo clippy --all-targets -- -D warnings

    sdk-rs-test:
      tags: rust test
      glob: "packages/sdk-rs/**/*.rs"
      root: "packages/sdk-rs"
      run: cargo test --quiet

    # --- JS / TS (apps/web, apps/app, packages/*, scripts/*) ----------
    # Mirrors CI's `js · prettier + typecheck` job. Catch failures
    # before push, not after a PR is open.
    # Incident 2026-04-25: a feature PR landed with prettier-dirty
    # auth files; CI prettier failed, app+web build was skipped, prod
    # went half-shipped (control + gateway only). These hooks make
    # that class of mistake local.
    js-prettier:
      tags: js format
      glob: "{apps,packages,scripts}/**/*.{ts,tsx,css}"
      run: bunx --bun prettier --check {staged_files}

    js-eslint:
      tags: js lint
      glob: "{apps/app,apps/web,packages,scripts}/**/*.{ts,tsx}"
      run: bunx eslint --max-warnings 0 {staged_files}

    js-tsc-app:
      tags: js typecheck
      glob: "apps/app/**/*.{ts,tsx}"
      root: "apps/app"
      run: bunx tsc -b --noEmit

    js-tsc-web:
      tags: js typecheck
      glob: "apps/web/**/*.{ts,tsx}"
      root: "apps/web"
      run: bunx tsc -b --noEmit

    # --- Elixir -------------------------------------------------------
    # Mirrors CI's `elixir · format` job. mix format with
    # --check-formatted returns non-zero on any file that isn't
    # formatted; we pass staged_files so only what's changing is
    # checked.
    elixir-format-control:
      tags: elixir format
      glob: "apps/control/**/*.{ex,exs}"
      root: "apps/control"
      run: mix format --check-formatted {staged_files}

    elixir-format-gateway:
      tags: elixir format
      glob: "apps/gateway/**/*.{ex,exs}"
      root: "apps/gateway"
      run: mix format --check-formatted {staged_files}

    # --- schemas ------------------------------------------------------
    # Any schema change has to regenerate or CI's drift guard fails.
    # Run the same check locally so nobody pushes a broken commit.
    # Only checks the generated tree — Go and Rust types are
    # hand-written and covered by their own round-trip tests.
    schema-drift:
      tags: schema
      glob: "packages/schemas/**/*"
      run: |
        uv run packages/sdk-gen/gen.py >/dev/null
        if ! git diff --quiet -- packages/sdk-py/src/hela/_generated packages/sdk-types; then
          echo "err: schema change did not regenerate SDK types" >&2
          echo "     run: make sdk.gen && git add ." >&2
          exit 1
        fi

# Enforce the subject-line rules from scripts/check-commit-msg.sh.
# Same check CI runs, but locally so a violating commit never gets made.
commit-msg:
  commands:
    subject:
      run: scripts/check-commit-msg.sh "$(sed -E '/^#/d;/^$/d' {1} | head -n 1)"
