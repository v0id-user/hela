server {
  # Railway's private network is IPv6-first; listen on both so the
  # edge (IPv4) and private network (IPv6) can both reach us.
  listen 80;
  listen [::]:80;
  server_name _;
  root /usr/share/nginx/html;

  location = /health {
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /version {
    try_files /version.json =404;
  }

  # SPA fallback: any path that isn't a static asset goes to
  # index.html so the TanStack router takes over client-side.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Static assets are content-hashed; cache hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
