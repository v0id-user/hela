<?xml version="1.0" encoding="UTF-8"?>
<!--
  Social avatar. 400 × 400. Square crop is what GitHub / Twitter /
  Discord want. Centres the signal mark on a soft radial so the
  gold "live" dot is the focal point.

  Not the same as mark.svg: this one is specifically tuned for
  profile pictures where you have generous real estate and want
  a more illustrative, less utilitarian read.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>hela avatar</title>

  <defs>
    <radialGradient id="avGlow" cx="60%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" fill="url(#avGlow)"/>

  <!-- 4 px corner bracket marks in each corner — tiny nod to the
       terminal frame, gives the square a bit of structure. -->
  <g stroke="#1f1f1f" stroke-width="1.5" fill="none">
    <path d="M 24 40 L 24 24 L 40 24"/>
    <path d="M 376 24 L 376 24 M 360 24 L 376 24 L 376 40"/>
    <path d="M 24 360 L 24 376 L 40 376"/>
    <path d="M 360 376 L 376 376 L 376 360"/>
  </g>

  <!-- Signal mark, centred + scaled up (source glyph is 128 × 64). -->
  <g transform="translate(64, 168) scale(2.1)">
    <path d="M 14 18 L 8 18 L 8 46 L 14 46"
          fill="none" stroke="#c9a76a" stroke-width="2.4"
          stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M 114 18 L 120 18 L 120 46 L 114 46"
          fill="none" stroke="#c9a76a" stroke-width="2.4"
          stroke-linecap="square" stroke-linejoin="miter"/>
    <line x1="22" y1="32" x2="108" y2="32"
          stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2 3"/>
    <circle cx="28"  cy="32" r="2.5" fill="#3a3a3a"/>
    <circle cx="46"  cy="32" r="3"   fill="#5a5a5a"/>
    <circle cx="64"  cy="32" r="3.5" fill="#8a8a8a"/>
    <circle cx="82"  cy="32" r="4"   fill="#c0c0c0"/>
    <circle cx="102" cy="32" r="9" fill="none" stroke="#c9a76a" stroke-width="1" opacity="0.55"/>
    <circle cx="102" cy="32" r="5" fill="#c9a76a"/>
  </g>

  <!-- Wordmark under the signal, understated. Same font stack. -->
  <text x="200" y="290" text-anchor="middle"
        font-family="'SF Mono', 'JetBrains Mono', 'Menlo', 'DejaVu Sans Mono', monospace"
        font-size="42" font-weight="500" letter-spacing="3">
    <tspan fill="#c9a76a">[&#160;</tspan>
    <tspan fill="#c0c0c0">hela</tspan>
    <tspan fill="#c9a76a">&#160;]</tspan>
  </text>

  <!-- Tiny under-caption for long-form contexts where the avatar
       ships alongside a handle. Falls out visually at small sizes,
       which is fine — the mark + wordmark carry the identity. -->
  <text x="200" y="332" text-anchor="middle"
        font-family="'SF Mono', 'JetBrains Mono', 'Menlo', 'DejaVu Sans Mono', monospace"
        font-size="12" letter-spacing="3" fill="#5a5a5a">
    REAL-TIME · BEAM
  </text>
</svg>
