<?xml version="1.0" encoding="UTF-8"?>
<!--
  README banner. 1280 × 320 — wide enough to survive GitHub's
  README rendering at 100% and scale down cleanly for mobile.

  Layout (left → right):
    • caption strip
    • oversized [ hela ] wordmark (gold brackets + silver type)
    • tagline, one line
    • three feature tags on a dotted rule
    • kinetic signal mark floating top-right, softly aligned to
      the baseline so the eye reads wordmark → signal → tagline
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <title>hela — managed real-time on BEAM</title>

  <defs>
    <!-- Warm vignette so edges do not feel abrupt on GitHub's
         dark-mode READMEs. -->
    <radialGradient id="bg" cx="38%" cy="45%" r="75%">
      <stop offset="0%"  stop-color="#141310"/>
      <stop offset="100%" stop-color="#070707"/>
    </radialGradient>
    <!-- Gradient under the big [ hela ] wordmark to give it a
         subtle forge-glow without being flashy. -->
    <linearGradient id="wordmarkGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#c9a76a" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c9a76a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Caption strip: tiny uppercase badge, wide tracking. -->
  <text x="64" y="60"
        font-family="'SF Mono', 'JetBrains Mono', 'Menlo', 'DejaVu Sans Mono', monospace"
        font-size="14" letter-spacing="4" fill="#c9a76a">
    MANAGED REAL-TIME ON BEAM
  </text>

  <line x1="64" y1="74" x2="1216" y2="74" stroke="#1c1c1c" stroke-width="1"/>

  <!-- Wordmark with faint under-glow. -->
  <rect x="60" y="98" width="740" height="132" fill="url(#wordmarkGlow)" rx="6"/>
  <text x="64" y="210"
        font-family="'SF Mono', 'JetBrains Mono', 'Menlo', 'DejaVu Sans Mono', monospace"
        font-size="120" font-weight="500" letter-spacing="4">
    <tspan fill="#c9a76a">[&#160;</tspan>
    <tspan fill="#c0c0c0">hela</tspan>
    <tspan fill="#c9a76a">&#160;]</tspan>
  </text>

  <!-- Tagline -->
  <text x="64" y="256"
        font-family="'SF Mono', 'JetBrains Mono', 'Menlo', 'DejaVu Sans Mono', monospace"
        font-size="22" fill="#a0a0a0">
    channels · presence · history · regions · sub-100ms
  </text>

  <!-- Feature tags on a dotted baseline. Each tag in bracket pairs
       so it echoes the wordmark without shouting. -->
  <g font-family="'SF Mono', 'JetBrains Mono', 'Menlo', 'DejaVu Sans Mono', monospace"
     font-size="14" fill="#7a7a7a" letter-spacing="1">
    <text x="64"  y="292">elixir · phoenix · presence · ets · broadway</text>
  </g>

  <!-- Signal mark, top-right. Scaled up from signal.svg so it
       matches the banner's visual weight without competing with
       the wordmark. -->
  <g transform="translate(920, 96) scale(2.6)">
    <path d="M 14 18 L 8 18 L 8 46 L 14 46"
          fill="none" stroke="#c9a76a" stroke-width="2.2"
          stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M 114 18 L 120 18 L 120 46 L 114 46"
          fill="none" stroke="#c9a76a" stroke-width="2.2"
          stroke-linecap="square" stroke-linejoin="miter"/>
    <line x1="22" y1="32" x2="108" y2="32"
          stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2 3"/>
    <circle cx="28"  cy="32" r="2.5" fill="#3a3a3a"/>
    <circle cx="46"  cy="32" r="3"   fill="#5a5a5a"/>
    <circle cx="64"  cy="32" r="3.5" fill="#8a8a8a"/>
    <circle cx="82"  cy="32" r="4"   fill="#c0c0c0"/>
    <circle cx="102" cy="32" r="8" fill="none" stroke="#c9a76a" stroke-width="0.9" opacity="0.5"/>
    <circle cx="102" cy="32" r="4.8" fill="#c9a76a"/>
  </g>
</svg>
