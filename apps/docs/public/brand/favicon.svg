<?xml version="1.0" encoding="UTF-8"?>
<!--
  Favicon. Same conceit as mark.svg but tuned for 16-32 px: the
  brackets are fatter (5 px stroke, not 2.5) and the dots are bigger
  relative to the canvas so the silhouette survives being drawn onto
  a tab at retina-half.

  One fewer dot than the full mark — at 16 px, three dots muddle.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>hela</title>
  <rect width="64" height="64" fill="#0a0a0a"/>

  <!-- Left bracket -->
  <path d="M 18 16 L 12 16 L 12 48 L 18 48"
        fill="none" stroke="#c9a76a" stroke-width="5"
        stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Right bracket -->
  <path d="M 46 16 L 52 16 L 52 48 L 46 48"
        fill="none" stroke="#c9a76a" stroke-width="5"
        stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Two dots — reads as a connection, a presence, a tiny blink. -->
  <circle cx="26" cy="32" r="5" fill="#c0c0c0"/>
  <circle cx="38" cy="32" r="5" fill="#c0c0c0"/>
</svg>
