<?xml version="1.0" encoding="UTF-8"?>
<!--
  Kinetic alt mark. Shows what's actually happening on the wire:
  a timeline of discrete events (UUIDv7 messages) with a gold
  "current" dot overtaking the trailing silver ones.

  Used for bigger surfaces (banner, avatar, hero). The smaller
  `mark.svg` is the one that survives 16 px.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 64" width="128" height="64">
  <title>hela — signal mark</title>
  <rect width="128" height="64" fill="#0a0a0a"/>

  <!-- Left bracket -->
  <path d="M 14 18 L 8 18 L 8 46 L 14 46"
        fill="none" stroke="#c9a76a" stroke-width="2.5"
        stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Right bracket -->
  <path d="M 114 18 L 120 18 L 120 46 L 114 46"
        fill="none" stroke="#c9a76a" stroke-width="2.5"
        stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Baseline timeline the dots sit on. Dotted to suggest discrete
       event ticks rather than continuous flow. -->
  <line x1="22" y1="32" x2="108" y2="32"
        stroke="#222" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- Four trailing events, decreasing in saturation. Reads left
       to right as "history → live". -->
  <circle cx="28"  cy="32" r="2.5" fill="#3a3a3a"/>
  <circle cx="46"  cy="32" r="3"   fill="#5a5a5a"/>
  <circle cx="64"  cy="32" r="3.5" fill="#8a8a8a"/>
  <circle cx="82"  cy="32" r="4"   fill="#c0c0c0"/>

  <!-- Leading event: the "live" frame. Gold, with a halo to suggest
       a pulse that just landed. -->
  <circle cx="102" cy="32" r="7" fill="none" stroke="#c9a76a" stroke-width="0.8" opacity="0.55"/>
  <circle cx="102" cy="32" r="4.5" fill="#c9a76a"/>
</svg>
