server {
  listen 80;
  listen [::]:80;
  server_name _;
  root /usr/share/nginx/html;

  location = /health {
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /version {
    try_files /version.json =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
