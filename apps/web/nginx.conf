server {
  # Railway's private network is IPv6-first; listen on both so the
  # edge (IPv4) and private network (IPv6) can both reach us.
  listen 80;
  listen [::]:80;
  server_name _;
  root /usr/share/nginx/html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Static assets: cache aggressively, they're content-hashed.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
