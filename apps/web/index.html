<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hela — open source real time on BEAM</title>
    <meta
      name="description"
      content="hela: open source real time on BEAM, same code you can self host. Hosted regions: channels, presence, history, sequencing, JWT auth. Pick a region, flat monthly pricing on the hosted product."
    />

    <!-- Favicons. SVG is crisp at any size; PNG fallback covers
         browsers that still don't accept SVG favicons (iOS Safari
         home-screen icon expects 180×180 PNG). -->
    <link rel="icon" type="image/svg+xml" href="/brand/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/png/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/brand/png/favicon-180.png" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Open Graph + Twitter card. Pointing at PNG, not SVG, because
         most unfurlers don't handle SVG previews. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="hela" />
    <meta property="og:title" content="hela — open source real time on BEAM" />
    <meta
      property="og:description"
      content="Open source and self hostable, same code as the hosted product. Channels, presence, history, regions. Sub-100ms. On hosted: flat pricing, no per-message billing."
    />
    <meta property="og:url" content="https://web-production-f24fc.up.railway.app" />
    <meta property="og:image" content="https://web-production-f24fc.up.railway.app/brand/png/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="hela — open source real time on BEAM" />
    <meta
      name="twitter:description"
      content="Open source real time on BEAM. Self host the same stack, or use hosted regions. Sub-100ms, flat monthly on hosted."
    />
    <meta name="twitter:image" content="https://web-production-f24fc.up.railway.app/brand/png/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
